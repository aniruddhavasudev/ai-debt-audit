name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch test fixtures from test-data branch
        run: |
          git fetch --depth 1 origin test-data
          git checkout origin/test-data -- test-fixtures calibration-pilot-results

      - name: Install Python scanning tools
        run: pip install --quiet semgrep bandit pip-audit

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=$(curl -sSf https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | head -1 | cut -d'"' -f4 | sed 's/^v//')
          if [ -z "$VERSION" ]; then VERSION="8.30.1"; echo "Warning: could not resolve latest gitleaks version (rate-limited?), falling back to pinned $VERSION"; fi
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks
          sudo chmod +x /usr/local/bin/gitleaks

      - name: Validate Semgrep rule syntax
        run: semgrep --validate --config rules/

      - name: Install project dependencies
        run: npm install

      - name: Run rule regression tests against test-fixtures/
        run: node scripts/test-rules.js

      - name: Run scoring engine unit tests
        run: node --test scripts/score.test.js

      - name: Run .aidebtrc.json config integration test
        run: node scripts/test-config-integration.js

      - name: Smoke-test the full CLI end to end
        run: |
          node bin/aidebt-scan.js test-fixtures/flask --out /tmp/ci-report.md --html /tmp/ci-report.html
          test -s /tmp/ci-report.md
          test -s /tmp/ci-report.html
          echo "CLI produced non-empty reports successfully."

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch test fixtures from test-data branch
        run: |
          git fetch --depth 1 origin test-data
          git checkout origin/test-data -- test-fixtures

      - name: Build the Docker image
        run: docker build -t ai-debt-audit:ci-test .

      - name: Smoke-test the built image end to end
        run: |
          # test-fixtures/flask is just a subdirectory of this repo, not its
          # own git repo — git-mine needs real git history to run at all, so
          # copy the fixture out and give it one, the same way every local
          # test in this project's history has (mounting the fixture
          # in-place fails with "is this a git repo with at least one
          # commit?", which is the tool being correct, not a bug).
          cp -r test-fixtures/flask /tmp/docker-smoke-test
          git -C /tmp/docker-smoke-test init -q
          git -C /tmp/docker-smoke-test -c user.email=ci@example.com -c user.name=CI add -A
          git -C /tmp/docker-smoke-test -c user.email=ci@example.com -c user.name=CI commit -q -m "smoke test fixture"
          docker run --rm -v /tmp/docker-smoke-test:/repo ai-debt-audit:ci-test . --out ai-debt-report.md
          test -s /tmp/docker-smoke-test/ai-debt-report.md
          echo "Docker image produced a non-empty report successfully."
