<svg xmlns="http://www.w3.org/2000/svg" width="840" height="584" viewBox="0 0 840 584" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e90ff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#9b59b6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="barTech" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8787"/><stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="barCog" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b07cc6"/><stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
    <linearGradient id="barInt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1abc9c"/><stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
    <filter id="windowShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="840" height="584" fill="#0a0c10"/>
  <rect width="840" height="584" fill="url(#bgGlow)"/>

  <!-- terminal window -->
  <g filter="url(#windowShadow)">
    <rect x="28" y="24" width="784" height="536" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <!-- title bar -->
    <path d="M28 38 a14 14 0 0 1 14 -14 h756 a14 14 0 0 1 14 14 v22 h-784 z" fill="#161b22"/>
    <circle cx="56" cy="49" r="6.5" fill="#ff5f57"/>
    <circle cx="78" cy="49" r="6.5" fill="#febc2e"/>
    <circle cx="100" cy="49" r="6.5" fill="#28c840"/>
    <text x="420" y="54" text-anchor="middle" font-size="12.5" fill="#8b949e">aidebt-scan — 84×28</text>
  </g>

  <!-- prompt -->
  <text x="56" y="98" font-size="14">
    <tspan fill="#28c840" font-weight="bold">➜</tspan>
    <tspan fill="#58a6ff" dx="8" font-weight="bold">my-saas-app</tspan>
    <tspan fill="#e6edf3" dx="8">aidebt-scan .</tspan>
  </text>

  <!-- tool steps -->
  <g font-size="13" fill="#8b949e">
    <text x="56" y="130"><tspan fill="#28c840">✓</tspan><tspan dx="8">Semgrep (technical debt)</tspan><tspan dx="8" fill="#484f58">(4.7s)</tspan></text>
    <text x="56" y="152"><tspan fill="#28c840">✓</tspan><tspan dx="8">git-mine (cognitive + intent debt)</tspan><tspan dx="8" fill="#484f58">(0.3s)</tspan></text>
    <text x="56" y="174"><tspan fill="#28c840">✓</tspan><tspan dx="8">jscpd (duplication)</tspan><tspan dx="8" fill="#484f58">(0.6s)</tspan></text>
    <text x="56" y="196"><tspan fill="#28c840">✓</tspan><tspan dx="8">gitleaks (historical secrets)</tspan><tspan dx="8" fill="#484f58">(1.2s)</tspan></text>
    <text x="56" y="218"><tspan fill="#28c840">✓</tspan><tspan dx="8">bandit (Python security)</tspan><tspan dx="8" fill="#484f58">(0.9s)</tspan></text>
    <text x="56" y="240"><tspan fill="#28c840">✓</tspan><tspan dx="8">npm audit + pip-audit (dependency vulnerabilities)</tspan><tspan dx="8" fill="#484f58">(1.5s)</tspan></text>
    <text x="56" y="262"><tspan fill="#28c840">✓</tspan><tspan dx="8">Scoring</tspan><tspan dx="8" fill="#484f58">(0.1s)</tspan></text>
  </g>

  <!-- report card -->
  <rect x="52" y="284" width="736" height="196" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="76" y="314" font-size="14" font-weight="bold" fill="#e6edf3" letter-spacing="2">AI-DEBT REPORT</text>
  <text x="764" y="314" text-anchor="end" font-size="14">
    <tspan fill="#8b949e">Composite </tspan><tspan fill="#e6edf3" font-weight="bold" font-size="17">28/100</tspan>
    <tspan dx="10" fill="#f1c40f" font-weight="bold">[Medium Risk]</tspan>
  </text>
  <line x1="76" y1="328" x2="764" y2="328" stroke="#30363d"/>

  <!-- bars: label | weight | track + fill | score -->
  <g font-size="13">
    <text x="76" y="362" fill="#e6edf3">Technical debt</text>
    <text x="76" y="404" fill="#e6edf3">Cognitive debt</text>
    <text x="76" y="446" fill="#e6edf3">Intent debt</text>
    <g fill="#484f58">
      <text x="248" y="362">(50%)</text>
      <text x="248" y="404">(25%)</text>
      <text x="248" y="446">(25%)</text>
    </g>

    <rect x="312" y="349" width="360" height="15" rx="7.5" fill="#21262d"/>
    <rect x="312" y="391" width="360" height="15" rx="7.5" fill="#21262d"/>
    <rect x="312" y="433" width="360" height="15" rx="7.5" fill="#21262d"/>

    <rect x="312" y="349" height="15" rx="7.5" fill="url(#barTech)">
      <animate attributeName="width" from="0" to="112" dur="0.9s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1"/>
    </rect>
    <rect x="312" y="391" height="15" rx="7.5" fill="url(#barCog)">
      <animate attributeName="width" from="0" to="184" dur="0.9s" begin="0.15s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1"/>
    </rect>
    <rect x="312" y="433" height="15" rx="7.5" fill="url(#barInt)">
      <animate attributeName="width" from="0" to="14" dur="0.9s" begin="0.3s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1"/>
    </rect>

    <g font-weight="bold" text-anchor="end">
      <text x="740" y="362" fill="#ff6b6b">31<tspan fill="#484f58" font-weight="normal">/100</tspan></text>
      <text x="740" y="404" fill="#9b59b6">51<tspan fill="#484f58" font-weight="normal">/100</tspan></text>
      <text x="740" y="446" fill="#16a085">3<tspan fill="#484f58" font-weight="normal">/100</tspan></text>
    </g>
  </g>

  <!-- outputs -->
  <text x="56" y="512" font-size="13" fill="#8b949e">
    <tspan fill="#484f58">Reports:</tspan>
    <tspan dx="8" fill="#58a6ff">ai-debt-report.md</tspan>
    <tspan dx="6" fill="#484f58">·</tspan><tspan dx="6" fill="#58a6ff">.html</tspan>
    <tspan dx="6" fill="#484f58">·</tspan><tspan dx="6" fill="#58a6ff">.pdf</tspan>
    <tspan dx="6" fill="#484f58">·</tspan><tspan dx="6" fill="#58a6ff">-csv/</tspan>
    <tspan dx="10" fill="#484f58">— every finding traces to an exact file and line</tspan>
  </text>

  <!-- next prompt + blinking cursor -->
  <text x="56" y="542" font-size="14">
    <tspan fill="#28c840" font-weight="bold">➜</tspan>
    <tspan fill="#58a6ff" dx="8" font-weight="bold">my-saas-app</tspan>
  </text>
  <rect x="196" y="530" width="9" height="16" fill="#e6edf3">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
